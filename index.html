<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>なにわモーター統合ツール</title>
<style>
body{background:#f8fafc;color:#0f172a;font-family:sans-serif;margin:0;padding:20px;}
.card{background:#ffffff;border-radius:12px;padding:16px;margin-bottom:16px;}
button{background:#22c55e;color:#fff;border:none;padding:10px;border-radius:8px;}
</style>
</head>
<body>

<h1>ギャングカラー検索</h1>
<input id="search" placeholder="検索">
<button onclick="search()">検索</button>

<div id="result"></div>

<script>
let gangData=[];

fetch('gang-data.json')
.then(res=>res.json())
.then(data=>{gangData=data;});

function search(){
  const q=document.getElementById('search').value;
  const r=gangData.filter(g=>g.name.includes(q));
  document.getElementById('result').innerHTML=
    r.map(g=>`<div class="card">${g.name}<br>${g.primary}</div>`).join('');
}
</script>

</body>
</html>
